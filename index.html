<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ipv6gg</title>
  <meta name="description" content="ipv6gg ist ein schnelles Browser-Arcade-Spiel, in dem du IPv6-Pakete per Longest Prefix Match korrekt routest." />
  <meta name="keywords" content="IPv6, Browsergame, Netzwerkspiel, Routing, Longest Prefix Match, Arcade" />
  <meta name="author" content="FullByte" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="canonical" href="https://fullbyte.github.io/ipv6gg/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ipv6gg" />
  <meta property="og:title" content="ipv6gg" />
  <meta property="og:description" content="Route IPv6-Pakete im Arcade-Style mit Longest Prefix Match und steigere deinen Highscore." />
  <meta property="og:url" content="https://fullbyte.github.io/ipv6gg/" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ipv6gg" />
  <meta name="twitter:description" content="IPv6-Routing als schnelles Browser-Arcade: Pakete korrekt routen, Kombos aufbauen, Highscore knacken." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230a0a1a'/%3E%3Ccircle cx='32' cy='32' r='18' fill='none' stroke='%2328d7ff' stroke-width='6'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
  <script src="i18n.js"></script>
</head>
<body>
  <div class="app">
    <div class="frame">
      <div id="shaderRoot" class="shader-layer" aria-hidden="true"></div>
      <div id="shaderPulseLayer" class="shader-pulse-layer" aria-hidden="true"></div>
      <div id="shaderStatus" class="shader-status" role="status" aria-live="polite"></div>
      <div id="shaderEffectMode" class="shader-effect" aria-live="polite"></div>
      <div id="shaderComboBanner" class="shader-combo-banner" aria-live="polite" aria-atomic="true"></div>
      <div id="impactFlash" class="impact-flash" aria-hidden="true"></div>
      <canvas id="game" width="800" height="600"></canvas>

      <div class="controls">
        <select id="langSelect" class="lang-select" aria-label="Sprache wählen">
          <option value="de">🇩🇪 Deutsch</option>
          <option value="en">🇬🇧 English</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="es">🇪🇸 Español</option>
        </select>
        <button id="musicBtn" aria-label="Musik umschalten">[M]usic: On</button>
        <button id="soundBtn" aria-label="Effekte umschalten">[E]ffekte: On</button>
        <button id="touchBtn" aria-label="Touch-Buttons umschalten">[T]ouch: On</button>
        <button id="helpBtn" aria-label="Spielhilfe anzeigen">[H]ilfe</button>
      </div>

      <div class="mobile-buttons" id="mobileButtons">
        <button class="mobile-btn" data-route="0" aria-label="Route 1">1</button>
        <button class="mobile-btn" data-route="1" aria-label="Route 2">2</button>
        <button class="mobile-btn" data-route="2" aria-label="Route 3">3</button>
        <button class="mobile-btn" data-route="3" aria-label="Route 4">4</button>
        <button class="mobile-btn" data-route="4" aria-label="Route 5">5</button>
      </div>

      <audio id="bgm" src="sound/ipv6-track1.mp3" loop preload="auto"></audio>

      <div class="overlay" id="startOverlay">
        <div class="panel">
          <h1>ipv6gg</h1>
          <p id="startIntro1">Du bist ein Router. Pakete fallen von oben mit IPv6-Zielen.</p>
          <p id="startIntro2">Route per Tasten <strong>1-5</strong>, oder <strong>Buttons</strong> (Touch=on) zum passenden Ziel.</p>
          <p id="startIntro3">Longest Prefix Match gewinnt, z.B. <code>2001:db8:1::abcd</code> passt zu <code>/64</code>.</p>
          <p class="start-help-hint" id="startHelpHint">Weitere Details siehe <a id="startHelpLink" href="#" aria-label="Hilfe anzeigen">[H]ilfe</a></p>
          <button id="startBtn">Spiel starten!</button>
        </div>
      </div>

      <div class="overlay hidden" id="endOverlay">
        <div class="panel" id="endPanel">
          <h2 id="endTitle">Verbindung getrennt!</h2>
          <p id="endScoreText"></p>
          <p id="endHighscoreText"></p>
          <button id="playAgainBtn">Play Again</button>
          <button type="button" id="viewLogBtn" class="view-log-btn">Log anzeigen</button>
        </div>
        <div class="panel game-log-panel hidden" id="gameLogPanel" role="dialog" aria-labelledby="gameLogTitle">
          <h2 id="gameLogTitle">Spiel-Log</h2>
          <ul id="gameLogList" class="game-log-list"></ul>
          <button type="button" id="closeLogBtn">Schließen</button>
        </div>
      </div>

      <div class="overlay hidden" id="helpOverlay">
        <div class="panel help-panel" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
          <h2 id="helpTitle">So funktioniert ipv6gg</h2>
          <p id="helpP1"></p>
          <p id="helpP2"></p>
          <p id="helpP3"></p>
          <p id="helpP4"></p>
          <p id="helpP5"></p>
          <p id="helpP6"></p>
          <p id="helpP7"></p>
          <p id="helpHotkeys"></p>
          <button id="closeHelpBtn">Verstanden</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="shader.js"></script>
  <script src="game.js"></script>
  <script defer src="https://umami.0xfab1.net/script.js" data-website-id="a9431491-8028-44e0-b5d5-46417644cd99"></script>
</body>
</html>
